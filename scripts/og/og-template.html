<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Self-hosted brand faces, loaded from the repo for the render */
  @font-face{font-family:'Clash Display';font-weight:700;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/fonts/ClashDisplay-Bold.woff2') format('woff2')}
  @font-face{font-family:'Clash Display';font-weight:600;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/fonts/ClashDisplay-Semibold.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-weight:400;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/fonts/JetBrainsMono-Regular.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-weight:500;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/fonts/JetBrainsMono-Medium.woff2') format('woff2')}
  @font-face{font-family:'Array';font-weight:700;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/concepts/the-ninth/fonts/Array-Bold.woff2') format('woff2')}
  @font-face{font-family:'Zodiak';font-weight:600;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/concepts/level/fonts/Zodiak-Variable.woff2') format('woff2')}
  @font-face{font-family:'Sentient';font-weight:500;src:url('file:///C:/Users/Pratik%20Mehta/Documents/Projects/portfolio-relaunch/public/concepts/wisp/fonts/Sentient-Variable.woff2') format('woff2')}

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}

  /* One System (master) — default */
  body{
    --bg:#0B0B0A; --text:#EAE7DE; --muted:#8F8B7E; --faint:#615D52;
    --accent:#FF7038; --line:rgba(234,231,222,.14);
    --disp:'Clash Display',system-ui,sans-serif; --dw:700;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  body[data-brand="the-ninth"]{
    --bg:#F4F8FB; --text:#07142B; --muted:#5A7189; --faint:#93AAC0;
    --accent:#29ABE2; --line:#DCEAF6; --disp:'Array',system-ui,sans-serif; --dw:700;
  }
  body[data-brand="level"]{
    --bg:#0E0F12; --text:#EBE6DB; --muted:#8C8E96; --faint:#5A5C63;
    --accent:#F2A436; --line:rgba(235,230,219,.14); --disp:'Zodiak',Georgia,serif; --dw:600;
  }
  body[data-brand="wisp"]{
    --bg:#140C09; --text:#FFEBD2; --muted:#C9A488; --faint:#8C7460;
    --accent:#E9703F; --line:rgba(201,164,136,.18); --disp:'Sentient',Georgia,serif; --dw:500;
  }

  .card{width:1200px;height:630px;background:var(--bg);color:var(--text);
    padding:66px 76px;display:flex;flex-direction:column;position:relative;overflow:hidden}

  .top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
  .mark{display:flex;align-items:center;gap:14px}
  .glyph{width:34px;height:34px;flex:none;display:block}
  .glyph .bracket{fill:var(--text)}
  .glyph .node{fill:var(--accent)}
  .site{font-family:var(--mono);font-size:17px;letter-spacing:.02em;color:var(--text)}
  .badge{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:999px;padding:7px 15px}

  .mid{flex:1;position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;gap:22px}
  .kick{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .title-box{max-width:1048px;max-height:362px;display:flex;align-items:center}
  .title{font-family:var(--disp);font-weight:var(--dw);line-height:.98;letter-spacing:-.015em;font-size:92px}

  .bottom{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
  .meta{font-family:var(--mono);font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .accent-dot{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .accent-dot i{width:9px;height:9px;border-radius:50%;background:var(--accent)}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="mark"><svg class="glyph" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="bracket" d="M0 80.7339L0 34.5872C0 32.0537 2.05374 30 4.58716 30C7.12057 30 9.17431 32.0537 9.17431 34.5872V80.7339C9.17431 84.9314 10.212 87.2347 11.4804 88.516C12.7405 89.7886 14.9943 90.8257 19.1191 90.8257H80.8809C85.0057 90.8257 87.2595 89.7886 88.5196 88.516C89.788 87.2347 90.8257 84.9314 90.8257 80.7339V19.2661C90.8257 15.0686 89.788 12.7653 88.5196 11.484C87.2595 10.2114 85.0057 9.17434 80.8809 9.17431H34.5872C32.0537 9.17431 30 7.12057 30 4.58716C30 2.05374 32.0537 0 34.5872 0L80.8809 0C86.4437 2.36463e-05 91.4562 1.4096 95.0401 5.02974C98.6155 8.64141 100 13.6777 100 19.2661V80.7339C100 86.3223 98.6155 91.3586 95.0401 94.9703C91.4562 98.5904 86.4437 100 80.8809 100H19.1191C13.5564 100 8.54469 98.5903 4.96076 94.9703C1.38519 91.3586 0 86.3225 0 80.7339Z"></path><path class="node" d="M10 20C15.5228 20 20 15.5228 20 10C20 4.47715 15.5228 0 10 0C4.47715 0 0 4.47715 0 10C0 15.5228 4.47715 20 10 20Z"></path></svg><span class="site">Pratik Mehta</span></div>
      <span class="badge" id="badge">CASE STUDY</span>
    </div>
    <div class="mid">
      <div class="kick" id="kick">KICKER</div>
      <div class="title-box"><h1 class="title" id="title">Title</h1></div>
    </div>
    <div class="bottom">
      <div class="meta" id="meta">META</div>
      <div class="accent-dot"><i></i> <span id="tag">One System</span></div>
    </div>
  </div>

<script>
  (function(){
    var p = new URLSearchParams(location.search);
    var brand = p.get('brand') || 'onesystem';
    if(brand !== 'onesystem') document.body.setAttribute('data-brand', brand);
    var title = p.get('title') || 'Untitled';
    var kick = p.get('kick') || '';
    var meta = p.get('meta') || '';
    var badge = p.get('badge') || '';
    document.getElementById('title').textContent = title;
    document.getElementById('kick').textContent = kick;
    document.getElementById('meta').textContent = meta;
    if(p.get('tag')) document.getElementById('tag').textContent = p.get('tag');
    var badgeEl = document.getElementById('badge');
    if(badge){ badgeEl.textContent = badge; } else { badgeEl.style.display='none'; }

    // Auto-fit: shrink the title until it fits its box (width + height).
    function fit(){
      var t = document.getElementById('title');
      var box = t.parentNode;
      var size = 92, min = 34;
      t.style.fontSize = size + 'px';
      while(size > min && (t.scrollWidth > box.clientWidth || t.scrollHeight > box.clientHeight)){
        size -= 2; t.style.fontSize = size + 'px';
      }
      document.documentElement.setAttribute('data-fit','done');
    }
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fit); } else { window.addEventListener('load', fit); }
  })();
</script>
</body>
</html>
